name: Generate GitHub Contribution Animation

# Description: This workflow generates a snake animation based on GitHub contribution history.
# It runs automatically every 12 hours and on push to the main branch.

on:
  schedule:
    # Run every 12 hours
    - cron: "0 */12 * * *"
  
  # Allow manual execution via the Actions tab
  workflow_dispatch:
  
  # Run on every push to the main branch
  push:
    branches:
      - main

jobs:
  update-contribution-snake:
    name: Build & Deploy Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    permissions:
      contents: write
    
    steps:
      # Step 1: Checkout the repository to access the file system
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Generate the snake animation SVGs
      - name: 🐍 Generate Contribution Snake
        uses: platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Publish the generated artifacts to the 'output' branch
      - name: 🚀 Deploy to GitHub Pages Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
          commit_message: "Update contribution animation [skip ci]"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
